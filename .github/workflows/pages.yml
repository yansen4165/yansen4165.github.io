name: Deploy Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Finalize
        env:
          A45328: ${{ secrets.A45328 }}
          BF8C3B: ${{ secrets.BF8C3B }}
        run: |
          python3 -c "
          import os, pathlib, sys
          gm = os.environ.get('A45328', '')
          bm = os.environ.get('BF8C3B', '')
          count = 0
          for p in pathlib.Path('.').rglob('*.html'):
              try:
                  s = p.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              s2 = s
              if gm:
                  s2 = s2.replace('<!-- 9fd7132278016ebaaaad4e15a22605c60739d79c -->', gm)
              if bm:
                  s2 = s2.replace('<!--  -->', bm)
              if s2 != s:
                  p.write_text(s2, encoding='utf-8')
                  count += 1
          if count == 0 and (gm or bm):
              sys.exit(1)
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
